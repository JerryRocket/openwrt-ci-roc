name: 360v6-LibWrt

on:
  workflow_dispatch:
  #自动编译：当Auto-Clean运行完成后
  workflow_run:
    workflows: ["Auto-Clean"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  Build:
    uses: ./.github/workflows/Build-OpenWrt.yml
    permissions:
      contents: write
      actions: write
    with:
      repo_url: https://github.com/LiBwrt/LibWrt.git
      repo_branch: 25.12-nss
      config_file: configs/IPQ60XX.config
      firmware_tag: 360v6 LibWrt 25.12-nss
      kernel_file: kernel-6.12
      artifact_prefix: IPQ60XX
      manifest_file: libwrt-qualcommax-ipq60xx.manifest
      release_summary: >-
        这是开启全功能NSS的6.12内核固件，默认主题为Argon；该固件在ImmortalWrt的基础上，添加了额外的软件包，并添加了若干工具，具体详见IPQ60XX.config和General.config。
